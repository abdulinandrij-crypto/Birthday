<!DOCTYPE html>
<html lang="uk">
<head>
    <title>Happy Birthday - Mobile</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/mobile_style.css">
</head>
<body>
    <div class="loading"></div>
    
    <!-- Декорації зверху -->
    <div class="container top-section">
        <div class="row bulbs-row">
            <div class="col-xs-2"><div class="bulb" id="bulb_yellow"></div></div>
            <div class="col-xs-2"><div class="bulb" id="bulb_red"></div></div>
            <div class="col-xs-2"><div class="bulb" id="bulb_blue"></div></div>
            <div class="col-xs-2"><div class="bulb" id="bulb_green"></div></div>
            <div class="col-xs-2"><div class="bulb" id="bulb_pink"></div></div>
            <div class="col-xs-2"><div class="bulb" id="bulb_orange"></div></div>
        </div>
        <img src="assets/images/banner.png" class="bannar">
    </div>

    <!-- Торт посередині -->
    <div class="cake-section">
        <div class="cake">
            <div class="velas"><div class="fuego"></div></div>
            <div class="cobertura"></div>
            <img src="assets/images/person.jpg" class="profile-img">
            <div class="bizcocho"></div>
        </div>
    </div>

    <!-- Привітання трішки нижче торта -->
    <div class="message">
        <p>З днем народження, крихітко! ❤️</p>
        <!-- Додай сюди інші рядки свого привітання -->
    </div>

    <!-- Фотографії в самому низу -->
    <div class="album-section">
        <img src="assets/images/photo1.jpg" class="album-photo">
        <img src="assets/images/photo2.jpg" class="album-photo">
        <img src="assets/images/photo3.jpg" class="album-photo">
        <img src="assets/images/photo4.jpg" class="album-photo">
    </div>

    <!-- Кнопки керування -->
    <div class="navbar navbar-fixed-bottom">
        <button class="btn btn-primary" id="turn_on">Ввімкнути світло</button>
        <button class="btn btn-primary" id="play" style="display:none">Включити музику</button>
        <button class="btn btn-primary" id="show_all" style="display:none">Показати сюрприз</button>
    </div>

    <audio class="song" loop><source src="assets/audio/hbd.mp3"></audio>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <script src="js/mobile_effect.js"></script>
</body>
</html>
